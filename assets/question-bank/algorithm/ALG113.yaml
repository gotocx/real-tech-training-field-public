id: ALG113
type: algorithm
status: accepted
difficulty: medium
time_limit_minutes: 18
title: '区间合并训练 10: 先测后写'
source_refs:
- source_id: the-algorithms-typescript
  repo: TheAlgorithms/TypeScript
  url: https://github.com/TheAlgorithms/TypeScript
  path: src/algorithms/sorting
  license: MIT
  usage: reference_only
- source_id: interactive-coding-challenges
  repo: donnemartin/interactive-coding-challenges
  url: https://github.com/donnemartin/interactive-coding-challenges
  path: questions/区间合并
  license: Apache-2.0
  usage: reference_only
training_action: 先让智能编程助手给出实现计划，再由用户补测试、审复杂度、运行标准样例。
prompt: 合并所有重叠区间，输入可能无序。要求说明排序依据和闭区间边界。
knowledge_points:
- 按起点排序
- 相邻重叠合并
- 不修改输入假设
standard_solution:
  summary: 使用题目匹配的核心策略和数据结构，先覆盖边界，再提交实现。
  file: assets/code-bank/standard/ALG113.js
  expected_complexity: O(n log n) time, O(n) space
bruteforce_solution:
  summary: 用直接枚举或完整扫描得到答案，用于校验小输入。
  risk: 大输入下会超时，必须说明为什么正式方案更稳。
common_mistakes:
- 只让工具生成代码但不补边界测试。
- 能跑通样例但说不清复杂度。
- 忽略空输入、重复值或非法参数。
edge_cases:
- 空输入
- 单元素
- 重复值
- 负数或极端边界
follow_up_questions:
- 如果输入规模从 100 扩大到 100 万，这道题的瓶颈在哪里？为什么 O(n²) 会挂但 O(n) 不会？
- 你现在会补哪一组边界测试来证明代码的可靠性？为什么选这组？
- 假如 AI 助手给了你一版错的实现，例如用双重循环但忘了 break，你先看代码的哪一段来判断靠不靠谱？
scoring_points:
  correctness: 40
  tests: 25
  complexity: 20
  explanation: 15
ai_ide_tasks:
- 把题面改写成实现约束清单。
- 要求助手生成三组边界测试，然后手动补一组反例。
- 对生成代码做复杂度和边界审查。
- 把单题结论接到 TypeScript、React、Node.js、Supabase、Nginx 或 Vercel 项目里的一个真实薄弱点。
project_transfer: 把局部算法能力迁移到列表过滤、搜索、调度或数据聚合模块。
interview_transfer: 用 90 秒说清思路、复杂度、边界和失败样例。
tests:
  kind: executable
  file: assets/code-bank/tests/ALG113.json
  runner: scripts/run_code_tests.py
